<form class="svellheim-compendium-installer">
  <p style="margin-bottom: 0.75em;">
    Select which compendium packs to import into the world. Each pack will be
    placed inside its own folder. Packs already imported are marked with a
    <i class="fas fa-check-circle" style="color: green;"></i>.
  </p>

  <div style="margin-bottom: 0.5em; display: flex; gap: 0.5em;">
    <button type="button" class="select-all" style="flex: 1;">
      <i class="fas fa-check-double"></i> Select All
    </button>
    <button type="button" class="select-none" style="flex: 1;">
      <i class="fas fa-times"></i> Select None
    </button>
  </div>

  <hr />

  <div style="max-height: 500px; overflow-y: auto;">
    {{#each groups}}
    <div style="margin-top: 0.75em;">
      <h3 style="margin: 0 0 0.25em 0; font-size: 1em; border-bottom: 2px solid var(--color-border-highlight, #7a7971);">
        {{this.label}}
      </h3>
      {{#each this.packs}}
      <div style="display: flex; align-items: center; padding: 4px 0 4px 12px; border-bottom: 1px solid var(--color-border-light-tertiary, #ddd);">
        <input type="checkbox" name="{{this.qualifiedName}}" id="pack-{{this.qualifiedName}}"
               {{#if this.checked}}checked{{/if}}
               style="margin-right: 8px;" />
        <label for="pack-{{this.qualifiedName}}" style="flex: 1; cursor: pointer;">
          {{this.label}}
          <span style="opacity: 0.6; font-size: 0.85em;">({{this.type}}, {{this.count}} entries)</span>
        </label>
        {{#if this.imported}}
        <i class="fas fa-check-circle" title="Previously imported" style="color: green; margin-left: 4px;"></i>
        {{/if}}
      </div>
      {{/each}}
    </div>
    {{/each}}
  </div>

  <hr />

  <button type="submit" style="width: 100%; margin-top: 0.5em;">
    <i class="fas fa-download"></i> Import Selected Packs
  </button>
</form>
